{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>{% block title %}Royal Hospitality{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

  <!-- ================= NAVBAR START ================= -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container"> <!-- NAV CONTAINER START -->

      <a class="navbar-brand fw-bold" href="{% url 'home' %}">Royal Hospitality</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item mx-2"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
          <li class="nav-item mx-2"><a class="nav-link" href="{% url 'menu' %}">Menu</a></li>
          <li class="nav-item mx-2"><a class="nav-link" href="{% url 'halls' %}">Halls</a></li>
          <li class="nav-item mx-2"><a class="nav-link" href="{% url 'rooms' %}">Rooms</a></li>
          <li class="nav-item mx-2"><a class="nav-link" href="{% url 'booking_contact' %}">Bookings</a></li>

        </ul>
      </div>

    </div> <!-- NAV CONTAINER END -->
  </nav>
  <!-- ================= NAVBAR END ================= -->


  <!-- ================= PAGE CONTENT START ================= -->
  {% block content %}
  {% endblock %}
  <!-- ================= PAGE CONTENT END ================= -->


  <!-- ================= FOOTER START ================= -->
  <footer class="bg-dark text-white py-3 mt-5">
    <div class="container text-center"> <!-- FOOTER CONTAINER START -->
      © 2025 Royal Hospitality. All Rights Reserved.
    </div> <!-- FOOTER CONTAINER END -->
  </footer>
  <!-- ================= FOOTER END ================= -->


  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/royal.js' %}"></script>

</body>
</html>
